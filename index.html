<!DOCTYPE html>
<html>
<head>
    <title>Interactive Algorithm Learning Platform</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Interactive Algorithm Learning Platform</h1>

<div class="controls">

    <label>Select Algorithm:</label>

    <select id="algorithm">
        <option>Bubble Sort</option>
        <option>Selection Sort</option>
        <option>Insertion Sort</option>
        <option>Linear Search</option>
        <option>Binary Search</option>
        <option>BFS</option>
        <option>DFS</option>
    </select>

    <br><br>

    <label>Enter Array:</label>
    <input type="text" id="arrayInput" placeholder="Example: 5,2,8,1">

    <br><br>

    <button id="generate">Generate</button>
    <button id="play">Play</button>
    <button id="pause">Pause</button>

    <br><br>

    <label>Speed:</label>
    <input type="range" id="speed" min="1" max="100" value="50">

</div>

<div id="visualizer">

</div>

<script src="script.js"></script>

</body>
</html>
